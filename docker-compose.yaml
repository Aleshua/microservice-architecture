services:
  users-db:
    image: postgres:18-alpine
    profiles: ["dev", "app"]
    environment:
      POSTGRES_USER: ${USERS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${USERS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${USERS_POSTGRES_DB}
    volumes:
      - users_pgdata:/var/lib/postgresql/data
    ports:
      - "${USERS_POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USERS_POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend-db:
    image: postgres:18-alpine
    profiles: ["dev", "app"]
    environment:
      POSTGRES_USER: ${BACKEND_POSTGRES_USER}
      POSTGRES_PASSWORD: ${BACKEND_POSTGRES_PASSWORD}
      POSTGRES_DB: ${BACKEND_POSTGRES_DB}
    volumes:
      - backend_pgdata:/var/lib/postgresql/data
    ports:
      - "${BACKEND_POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BACKEND_POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  users-service:
    build: ./users_service
    profiles: ["app"]
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./users_service/src:/app/src
      - ./users_service/alembic:/app/alembic
    env_file:
      - ./users_service/.env
    depends_on:
      users-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, os; urllib.request.urlopen(os.environ['APP_URL'] + '/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    profiles: ["app"]
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
    env_file:
      - ./backend/.env
    depends_on:
      backend-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, os; urllib.request.urlopen(os.environ['APP_URL'] + '/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  api-gateway:
    image: nginx:alpine
    profiles: ["app"]
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      users-service:
        condition: service_healthy
      backend:
        condition: service_healthy

volumes:
  users_pgdata:
  backend_pgdata:
