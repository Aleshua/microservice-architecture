services:
  users-db:
    image: postgres:18-alpine
    profiles: ["dev", "app"]
    environment:
      POSTGRES_USER: ${USERS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${USERS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${USERS_POSTGRES_DB}
    volumes:
      - users_pgdata:/var/lib/postgresql/data
    ports:
      - "${USERS_POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USERS_POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - users-net

  backend-db:
    image: postgres:18-alpine
    profiles: ["dev", "app"]
    environment:
      POSTGRES_USER: ${BACKEND_POSTGRES_USER}
      POSTGRES_PASSWORD: ${BACKEND_POSTGRES_PASSWORD}
      POSTGRES_DB: ${BACKEND_POSTGRES_DB}
    volumes:
      - backend_pgdata:/var/lib/postgresql/data
    ports:
      - "${BACKEND_POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BACKEND_POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend-net

  users-service:
    build: ./users_service
    profiles: ["app"]
    command: ["sh", "-c", "uvicorn src.main:app --host 0.0.0.0 --port $$APP_PORT --reload"]
    volumes:
      - ./users_service/src:/app/src
      - ./users_service/alembic:/app/alembic
    env_file:
      - ./users_service/.env
    depends_on:
      users-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, os; urllib.request.urlopen(os.environ['APP_URL'] + '/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - users-net
      - gateway-net

  backend:
    build: ./backend
    profiles: ["app"]
    command: ["sh", "-c", "uvicorn src.main:app --host 0.0.0.0 --port $$APP_PORT --reload"]
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
    env_file:
      - ./backend/.env
    depends_on:
      backend-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, os; urllib.request.urlopen(os.environ['APP_URL'] + '/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend-net
      - gateway-net

  redis:
    image: redis:7-alpine
    profiles: ["dev", "app"]
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend-net

  worker:
    build: ./worker
    profiles: ["app"]
    environment:
      REDIS_URL: ${REDIS_URL}
      USERS_DATABASE_URL: postgresql://${USERS_POSTGRES_USER}:${USERS_POSTGRES_PASSWORD}@users-db:5432/${USERS_POSTGRES_DB}
      PUSH_URL: http://push-notificator:8000/api/v1/notify
    depends_on:
      redis:
        condition: service_healthy
      users-db:
        condition: service_healthy
      push-notificator:
        condition: service_started
    networks:
      - backend-net
      - users-net

  push-notificator:
    image: ghcr.io/ayusavin/push-notification-playground:1.0.0
    profiles: ["app"]
    ports:
      - "${PUSH_PORT}:8000"
    networks:
      - backend-net

  api-gateway:
    image: nginx:alpine
    profiles: ["app"]
    ports:
      - "${GATEWAY_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      users-service:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - gateway-net

networks:
  users-net:
    driver: bridge
  backend-net:
    driver: bridge
  gateway-net:
    driver: bridge

volumes:
  users_pgdata:
  backend_pgdata:
